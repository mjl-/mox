name: Release

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

env:
  GO_VERSION: 'stable'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: 'npm'

      - run: npm ci --ignore-scripts

      # Trigger frontend rebuild to verify generated files match.
      - run: touch */*.ts

      - run: make build

      - name: Ensure generated files are committed
        run: git diff --exit-code

      - name: Run tests
        run: mkdir -p tmp && TMPDIR=$PWD/tmp make test

      - name: Run race detector tests
        run: mkdir -p tmp && TMPDIR=$PWD/tmp make test-race

      - name: Cross-compile all platforms
        run: make buildall

  check:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install tools
        run: |
          CGO_ENABLED=0 go install honnef.co/go/tools/cmd/staticcheck@latest
          CGO_ENABLED=0 go install github.com/gordonklaus/ineffassign@v0.1.0
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run checks
        run: make check

      - name: Run govulncheck
        run: govulncheck ./...

  apidiff:
    name: API Diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install apidiff
        run: CGO_ENABLED=0 go install golang.org/x/exp/cmd/apidiff@latest

      - name: Generate API diff
        run: ./apidiff.sh

      - uses: actions/upload-artifact@v4
        with:
          name: apidiff
          path: apidiff/next.txt

  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [validate, check]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: '386'
          - goos: linux
            goarch: ppc64le
          - goos: linux
            goarch: s390x
          - goos: openbsd
            goarch: amd64
          - goos: freebsd
            goarch: amd64
          - goos: netbsd
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: dragonfly
            goarch: amd64
          - goos: illumos
            goarch: amd64
          - goos: solaris
            goarch: amd64
          - goos: aix
            goarch: ppc64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          version="${GITHUB_REF_NAME}"
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          output="mox-${version}-${GOOS}-${GOARCH}${ext}"
          go build -trimpath -o "$output"
          echo "$output" > binary-name.txt

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            mox-*
            binary-name.txt

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-binaries, apidiff]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: apidiff
          path: artifacts/apidiff

      - name: Generate checksums
        working-directory: artifacts
        run: |
          rm -f binary-name.txt
          sha256sum mox-* > checksums-sha256.txt

      - name: Generate release notes
        id: notes
        run: |
          version="${GITHUB_REF_NAME}"
          prev_tag=$(git tag --sort=-v:refname | grep -E '^v' | sed -n '2p')

          {
            echo "body<<RELEASE_EOF"

            if [ -n "$prev_tag" ]; then
              echo "## Changes since ${prev_tag}"
              echo
              git log --oneline "${prev_tag}..${version}" | head -n 200
            else
              echo "## Initial release"
            fi

            echo
            echo "---"
            echo

            # API diff section
            if [ -s artifacts/apidiff/next.txt ]; then
              echo "## API Changes"
              echo
              echo '```'
              cat artifacts/apidiff/next.txt
              echo '```'
              echo
              echo "---"
              echo
            fi

            echo "## Install"
            echo
            echo '```bash'
            echo "# Binary"
            echo "CGO_ENABLED=0 go install github.com/mjl-/mox@${version}"
            echo
            echo "# Docker"
            echo "docker pull ghcr.io/mjl-/mox:${version#v}"
            echo '```'
            echo
            echo "## Verify"
            echo
            echo "SHA-256 checksums are in \`checksums-sha256.txt\`."
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Determine pre-release
        id: prerelease
        run: |
          version="${GITHUB_REF_NAME}"
          if echo "$version" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          name: Mox ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          prerelease: ${{ steps.prerelease.outputs.prerelease }}
          files: |
            artifacts/mox-*
            artifacts/checksums-sha256.txt
